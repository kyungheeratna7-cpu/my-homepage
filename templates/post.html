{% extends 'base.html' %}
{% block title %}{{ post.title }} — {{ profile.name }}{% endblock %}

{% block content %}
<article class="post-article">
  <header class="post-header">
    <div class="post-meta">
      <span class="post-category">{{ post.category }}</span>
      <span class="post-date">{{ post.date }}</span>
    </div>
    <h1 class="post-article-title">{{ post.title }}</h1>
  </header>
  <div class="post-body">
    <p>{{ post.content }}</p>
  </div>
  <a href="/" class="back-link">← 목록으로</a>
</article>
{% endblock %}
